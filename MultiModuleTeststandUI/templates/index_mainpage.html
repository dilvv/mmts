<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Multimodule Teststand UI</title>

  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

<body>
  <main class="page">
    <header class="page-header">
      <h1>Multimodule Teststand UI</h1>
    </header>

    <section class="card">
      <h2>Environment Monitor</h2>

      <iframe
        class="env-frame"
        src="{{ EnvMonitor_URL }}"
        style="height: {{ EnvMonitor_height }};">
      </iframe>
    </section>

    <section class="card">
      <h2>Select a Job</h2>

      <form id="optionsForm" class="job-form">
        <label class="job-option">
          <input
            type="radio"
            name="option"
            value="task1"
            {% if selected_option == 'task1' %}checked{% endif %}>
          <span>Single Pedestal Run</span>
        </label>

        <label class="job-option">
          <input
            type="radio"
            name="option"
            value="task2"
            {% if selected_option == 'task2' %}checked{% endif %}>
          <span>IV Scan</span>
        </label>

        <label class="job-option">
          <input
            type="radio"
            name="option"
            value="task3"
            {% if selected_option == 'task3' %}checked{% endif %}>
          <span>OLD IV Scan OLD</span>
        </label>

        <button type="button" class="primary-btn" onclick="confirmSelection()">
          Confirm
        </button>
      </form>
    </section>

    <section class="card">

      <iframe
        id="myIframe"
        class="task-frame"
        onload="adjustIframeHeight()"
        src="{% if selected_option == 'task1' %}{{ url_for('app_task1.main') }}{% elif selected_option == 'task2' %}{{ url_for('app_task2.main') }}{% elif selected_option == 'task3' %}{{ url_for('app_task3.main') }}{% endif %}">
      </iframe>
    </section>
  </main>

  <script>
    const TASK_URLS = {
      task1: "{{ url_for('app_task1.main') }}",
      task2: "{{ url_for('app_task2.main') }}",
      task3: "{{ url_for('app_task3.main') }}"
    };

    function getCsrfToken() {
      return document.querySelector('meta[name="csrf-token"]').content;
    }

    function confirmSelection() {
      const selected = document.querySelector('input[name="option"]:checked');

      if (!selected) {
        alert("Please select an option.");
        return;
      }

      const iframe = document.getElementById("myIframe");
      iframe.src = TASK_URLS[selected.value];

      fetch("/set_option", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCsrfToken()
        },
        body: JSON.stringify({ option: selected.value })
      });
    }

    function adjustIframeHeight() {
      const iframe = document.getElementById("myIframe");

      try {
        const body = iframe.contentWindow.document.body;
        iframe.style.height = body.scrollHeight + "px";
      } catch (error) {
        console.warn("Cannot access iframe height. Using default height.");
        iframe.style.height = "700px";
      }
    }
  </script>
</body>
</html>
